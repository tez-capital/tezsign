header:
  version: 14
  includes:
    - kas.yml  # Pull in everything from the main file

local_conf_header:
  # This block overrides the strict security from the base file
  security_lockdown: |
    IMAGE_INSTALL:append = " sudo bash tezsign-gadget-ecm"
    # OVERRIDDEN FOR DEV MODE:
    EXTRA_IMAGE_FEATURES:append = " ssh-server-openssh"
    IMAGE_INSTALL:append = " sudo bash tezsign-gadget-ecm"
    IMAGE_INSTALL:remove = "wpa-supplicant networkmanager dropbear"
    hostname:pn-base-files = "tezsign-dev"
    
    INHERIT += "extrausers"
    EXTRA_USERS_PARAMS = "\
        useradd -m -s /bin/bash dev; \
        usermod -P tezsign dev; \
        usermod -aG sudo dev; \
    "