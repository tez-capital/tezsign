header:
  version: 14
  includes:
    - base.yml

machine: raspberrypi4-tezsign

local_conf_header:
  release: |
    TEZSIGN_RELEASE_NAME = "rpi4"

  main: |
    TEZSIGN_DWC2_DR_MODE = "otg"
    INITRAMFS_IMAGE = "tezsign-initramfs"
    INITRAMFS_IMAGE_BUNDLE = "1"
    CMDLINE_ROOTFS = "root=/dev/ram0 rw rootfstype=ramfs rdinit=/sbin/init"
    RPI_EXTRA_CONFIG:append = "\ndtoverlay=dwc2,dr_mode=${TEZSIGN_DWC2_DR_MODE}"
    CMDLINE:append = " modprobe.blacklist=brcmfmac,brcmutil,hci_uart,btbcm,bluetooth"
