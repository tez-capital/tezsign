#     acl bluez dbus elfutils idn locale localed \
#     vconsole machined hibernate myhostname \
#     manpages polkit seccomp xkbcommon \
# "

# IMAGE_LINGUAS = ""
# FORCE_RO_REMOVE = "1"
# NO_RECOMMENDATIONS = "1"

BBFILES_DYNAMIC += " \
    raspberrypi:${LAYERDIR}/dynamic-layers/raspberrypi/recipes-bsp/*/*.bbappend \
    rockchip:${LAYERDIR}/dynamic-layers/rockchip/recipes-bsp/*/*.bbappend \
"