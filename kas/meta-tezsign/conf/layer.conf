BBPATH .= ":${LAYERDIR}"
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-tezsign"
BBFILE_PATTERN_meta-tezsign = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-tezsign = "10"

LAYERDEPENDS_meta-tezsign = "core"
LAYERSERIES_COMPAT_meta-tezsign = "whinlatter scarthgap"

