# Radxa Zero 3W dev additions for local HDMI console.
# Rockchip Display/Graphics Stack (Replaces VC4/MBOX)
CONFIG_DRM=y
CONFIG_DRM_ROCKCHIP=y
CONFIG_ROCKCHIP_DW_HDMI=y
CONFIG_ROCKCHIP_INNO_HDMI=y
CONFIG_ROCKCHIP_DW_MIPI_DSI=n

# Core Input and Virtual Terminal support
CONFIG_INPUT=y
CONFIG_SERIO=y
CONFIG_VT=y
CONFIG_VT_CONSOLE=y
CONFIG_HID=y
CONFIG_USB_HID=y

# Framebuffer and Console output
CONFIG_FB=y
CONFIG_FRAMEBUFFER_CONSOLE=y
CONFIG_FRAMEBUFFER_CONSOLE_DETECT_PRIMARY=y
CONFIG_LOGO=y

# Audio Stack (HDMI Audio)
CONFIG_SOUND=y
CONFIG_SND=y
CONFIG_SND_SOC=y
CONFIG_SND_SOC_ROCKCHIP=y
CONFIG_SND_SOC_ROCKCHIP_I2S=y
CONFIG_SND_SOC_HDMI_CODEC=y

# Necessary PHY for HDMI signaling on RK3566
CONFIG_PHY_ROCKCHIP_INNO_USB2=y