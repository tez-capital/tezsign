# ── USB gadget path ──────────────────────────────────────────────────────────
# Platform controller (DWC2 or DWC3) enabled by platform fragment.
CONFIG_USB_CONFIGFS_ECM=y
CONFIG_USB_F_ECM=y

# ── Networking ───────────────────────────────────────────────────────────────
CONFIG_PACKET=y
CONFIG_INET=y
CONFIG_NETDEVICES=y

# ── Serial / console ───────────────────────────────────────────────────────────────
CONFIG_SERIAL_8250=y
CONFIG_SERIAL_8250_CONSOLE=y
CONFIG_SERIAL_OF_PLATFORM=y