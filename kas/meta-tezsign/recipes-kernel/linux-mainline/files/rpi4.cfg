# Raspberry Pi 4 — board-specific.
CONFIG_BCM2711_THERMAL=y
# Pi 4 needs dual-role for the USB-C port (host via Type-A, gadget via USB-C).
CONFIG_USB_DWC2_PERIPHERAL=n
CONFIG_USB_DWC2_DUAL_ROLE=y
CONFIG_NR_CPUS=4

# Pi 4 boot-critical MMC host path under allnoconfig.
CONFIG_MMC_SDHCI=y
CONFIG_MMC_SDHCI_PLTFM=y
CONFIG_MMC_SDHCI_OF_ARASAN=y
CONFIG_MMC_SDHCI_IPROC=y
CONFIG_MMC_SDHCI_BRCMSTB=y

# Keep serial console visibility for bring-up/debug.
CONFIG_SERIAL_8250=y
CONFIG_SERIAL_8250_CONSOLE=y
CONFIG_SERIAL_AMBA_PL011=y
CONFIG_SERIAL_AMBA_PL011_CONSOLE=y
