# ══════════════════════════════════════════════════════════════════════════════
# Raspberry Pi 4 — board-specific
# ══════════════════════════════════════════════════════════════════════════════

# ── Thermal ────────────────────────────────────────────────────────────────
CONFIG_BCM2711_THERMAL=y

# ── USB mode override ─────────────────────────────────────────────────────
# Pi 4 needs dual-role for the USB-C port (host via Type-A, gadget via USB-C).
CONFIG_USB_DWC2_PERIPHERAL=n
CONFIG_USB_DWC2_DUAL_ROLE=y

# ── CPU topology ───────────────────────────────────────────────────────────
CONFIG_NR_CPUS=4
