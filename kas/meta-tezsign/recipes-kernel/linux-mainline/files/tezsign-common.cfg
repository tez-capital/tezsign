# Shared Tezsign kernel tuning for the RT benchmark pass.
CONFIG_EXPERT=y
CONFIG_PREEMPT_RT=y
CONFIG_HIGH_RES_TIMERS=y
CONFIG_HZ_250=n
CONFIG_HZ_1000=y
CONFIG_NO_HZ_IDLE=n
CONFIG_NO_HZ_FULL=y
CONFIG_RCU_NOCB_CPU=y
CONFIG_SUSPEND=n
CONFIG_HIBERNATION=n
CONFIG_KSM=n
CONFIG_TRANSPARENT_HUGEPAGE=n
CONFIG_CPU_FREQ_GOV_SCHEDUTIL=y
CONFIG_CPU_FREQ_DEFAULT_GOV_ONDEMAND=n
CONFIG_CPU_FREQ_DEFAULT_GOV_SCHEDUTIL=y
CONFIG_ENERGY_MODEL=y
CONFIG_CPU_IDLE=n

# ── Cross-platform trimming (applies to ALL tezsign boards) ──────────────

# Process accounting / stats: not needed for an appliance.
CONFIG_BSD_PROCESS_ACCT=n
CONFIG_TASKSTATS=n
CONFIG_POSIX_MQUEUE=n
CONFIG_IRQ_TIME_ACCOUNTING=n

# Scheduler: no SMT on any target SoC, no desktop auto-grouping.
CONFIG_SCHED_SMT=n
CONFIG_SCHED_AUTOGROUP=n

# Cgroups: keep MEMCG + CGROUP_PIDS + CGROUP_DEVICE (systemd needs them).
CONFIG_BLK_CGROUP=n
CONFIG_CGROUP_FREEZER=n
CONFIG_CGROUP_HUGETLB=n
CONFIG_CGROUP_CPUACCT=n
CONFIG_CGROUP_PERF=n

# Namespaces/containers: not used.
CONFIG_USER_NS=n

# Boot: no initrd, pure aarch64 userspace (musl 64-bit).
CONFIG_BLK_DEV_INITRD=n
CONFIG_COMPAT=n

# CPU freq: trim stats and non-platform governors.
CONFIG_CPU_FREQ_STAT=n
CONFIG_CPU_FREQ_GOV_POWERSAVE=n
CONFIG_CPU_FREQ_GOV_USERSPACE=n
CONFIG_ARM_SCPI_CPUFREQ=n

# Memory: no hot-plug, no hugepages, no failure injection.
CONFIG_MEMORY_HOTPLUG=n
CONFIG_MEMORY_HOTREMOVE=n
CONFIG_MEMORY_FAILURE=n
CONFIG_HUGETLBFS=n

# Non-platform arch: trim Broadcom server/STB sub-architectures.
CONFIG_ARCH_BCM_IPROC=n
CONFIG_ARCH_BCMBCA=n
CONFIG_ARCH_BRCMSTB=n

# PCI: no board uses PCIe in production (rpi4-dev re-enables for USB3).
CONFIG_PCI=n

