# ══════════════════════════════════════════════════════════════════════════════
# tezsign — common production options
# ══════════════════════════════════════════════════════════════════════════════

# ── Initramfs ──────────────────────────────────────────────────────────────
# Required for INITRAMFS_IMAGE_BUNDLE.
CONFIG_BLK_DEV_INITRD=y

# ── USB gadget ─────────────────────────────────────────────────────────────
# Platform controller (DWC2 or DWC3) enabled by platform fragment.
CONFIG_USB=y
CONFIG_USB_SUPPORT=y
CONFIG_USB_GADGET=y
CONFIG_USB_LIBCOMPOSITE=y
CONFIG_USB_CONFIGFS=y
CONFIG_USB_CONFIGFS_F_FS=y
CONFIG_USB_F_FS=y
CONFIG_CONFIGFS_FS=y
CONFIG_USB_GADGET_VBUS_DRAW=500