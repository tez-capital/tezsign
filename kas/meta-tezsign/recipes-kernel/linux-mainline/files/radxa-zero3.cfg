# Radxa Zero 3W / RK3566 Thermal and IO
CONFIG_ROCKCHIP_THERMAL=y
CONFIG_PCIE_ROCKCHIP_HOST=n
CONFIG_PCIE_ROCKCHIP_DW_HOST=n
CONFIG_USB_XHCI_HCD=n
CONFIG_USB_STORAGE=n
CONFIG_USB_UAS=n
CONFIG_SCSI=n
CONFIG_BLK_DEV_SD=n

# Headless production: no local input stack or VT console
CONFIG_INPUT=n
CONFIG_SERIO=n
CONFIG_VT=n
CONFIG_MAGIC_SYSRQ=n
CONFIG_HID=n
CONFIG_USB_HID=n

# Appliance status: keep Rockchip LED driver, drop watchdog/RTC
CONFIG_WATCHDOG=n
CONFIG_LEDS_CLASS=y
CONFIG_LEDS_GPIO=y
CONFIG_RTC_CLASS=n
CONFIG_ROCKCHIP_SARADC=n

# Hardware RNG: Keep Rockchip Crypto/RNG, drop unrelated platform drivers
CONFIG_CRYPTO_DEV_ROCKCHIP=y
CONFIG_HW_RANDOM_ROCKCHIP=y
CONFIG_HW_RANDOM_BCM74110=n
CONFIG_HW_RANDOM_IPROC_RNG200=n
CONFIG_HW_RANDOM_ARM_SMCCC_TRNG=n
CONFIG_HW_RANDOM_CN10K=n
CONFIG_HW_RANDOM_TPM=n

# MMC Host Stack: Keep Rockchip SDHCI/DW-MMC, drop others
CONFIG_MMC_SDHCI_ROCKCHIP=y
CONFIG_MMC_DW=y
CONFIG_MMC_DW_PLTFM=y
CONFIG_MMC_DW_ROCKCHIP=y
CONFIG_MMC_ARMMMCI=n
CONFIG_MMC_STM32_SDMMC=n
CONFIG_MMC_SDHCI_ACPI=n
CONFIG_MMC_SDHCI_OF_DWCMSHC=n
CONFIG_MMC_SDHCI_CADENCE=n
CONFIG_MMC_SDHCI_F_SDH30=n
CONFIG_MMC_SPI=n
CONFIG_MMC_MTK=n
CONFIG_MMC_SDHCI_XENON=n

# Drop multi-platform subsystems unrelated to RK3566 appliance
CONFIG_EDAC=n
CONFIG_VFIO=n
CONFIG_STAGING=n
CONFIG_IIO=n
CONFIG_HWSPINLOCK=n
CONFIG_ARM_MHU=n
CONFIG_PLATFORM_MHU=n

# Drop ChromeOS and non-Rockchip Clock drivers
CONFIG_CHROME_PLATFORMS=n
CONFIG_CROS_EC=n
CONFIG_COMMON_CLK_RK808=n
CONFIG_COMMON_CLK_SCMI=n
CONFIG_COMMON_CLK_SCPI=n
CONFIG_COMMON_CLK_CS2000_CP=n
CONFIG_COMMON_CLK_S2MPS11=n
CONFIG_COMMON_CLK_XGENE=n
CONFIG_COMMON_CLK_PWM=n
CONFIG_COMMON_CLK_RS9_PCIE=n
CONFIG_COMMON_CLK_VC3=n
CONFIG_COMMON_CLK_VC5=n

# Explicitly disable RPi-specific hardware often left in generic configs
CONFIG_BCM2835_THERMAL=n
CONFIG_SENSORS_RASPBERRYPI_HWMON=n