# Radxa Zero 3W dev additions.
# DWC3 dual-role: respects per-port dr_mode from device tree.
# fcc00000.usb (USB-C) = OTG/gadget, fd000000.usb = host.
CONFIG_USB_DWC2=n
CONFIG_USB_DWC2_PERIPHERAL=n

# Ensure the Rockchip USB PHYs are built-in
CONFIG_PHY_ROCKCHIP_INNO_USB2=y
CONFIG_PHY_ROCKCHIP_NANENG_COMBO_PHY=y