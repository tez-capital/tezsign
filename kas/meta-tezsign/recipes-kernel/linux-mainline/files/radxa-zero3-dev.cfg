# Radxa Zero 3W dev additions.
# DWC3 Dual-Role mode allows the USB-C data port to switch between 
# Peripheral (Gadget SSH) and Host (Keyboard/Mouse) via OTG cable detection.
CONFIG_USB_DWC2=n
CONFIG_USB_DWC2_PERIPHERAL=n
CONFIG_USB_DWC3=y
CONFIG_USB_DWC3_HOST=n
CONFIG_USB_DWC3_GADGET=n
CONFIG_USB_DWC3_DUAL_ROLE=y

# Ensure the Rockchip USB PHY is built-in to handle the role switching
CONFIG_PHY_ROCKCHIP_INNO_USB2=y
CONFIG_PHY_ROCKCHIP_NANENG_COMBPHY=y