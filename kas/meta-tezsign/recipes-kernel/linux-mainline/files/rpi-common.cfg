# Raspberry Pi platform — SoC and family-wide drivers.
# Enables ARCH_BCM2835 and the BCM peripherals needed to boot.
CONFIG_ARCH_BCM=y
CONFIG_ARCH_BCM2835=y

# Firmware / mailbox / clock / power
CONFIG_MAILBOX=y
CONFIG_BCM2835_MBOX=y
CONFIG_RASPBERRYPI_FIRMWARE=y
CONFIG_RASPBERRYPI_POWER=y
CONFIG_CLK_RASPBERRYPI=y
CONFIG_ARM_RASPBERRYPI_CPUFREQ=y

# USB: DWC2 peripheral (board-dev can override to DUAL_ROLE).
CONFIG_USB_DWC2=y
CONFIG_USB_DWC2_PERIPHERAL=y

# MMC host
CONFIG_MMC_BCM2835=y

# DMA engine
CONFIG_DMA_BCM2835=y

# Serial: mini-UART
CONFIG_SERIAL_8250_BCM2835AUX=y

# PWM
CONFIG_PWM_BCM2835=y
