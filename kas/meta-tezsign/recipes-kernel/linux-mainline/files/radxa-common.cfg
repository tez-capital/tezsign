# Core Rockchip / Radxa Zero 3W keepers
CONFIG_ARCH_ROCKCHIP=y
CONFIG_ROCKCHIP_PM_DOMAINS=y
CONFIG_COMMON_CLK_ROCKCHIP=y
CONFIG_ROCKCHIP_IOMMU=y
CONFIG_PWM_ROCKCHIP=y
CONFIG_PHY_ROCKCHIP_INNO_USB2=y
CONFIG_PHY_ROCKCHIP_NANENG_COMBO_PHY=y

# Latency and Performance
CONFIG_ROCKCHIP_THERMAL=y

# USB Gadget Path for RK3566 (DWC3 is the primary controller here)
# Use DUAL_ROLE so the driver respects per-port dr_mode from the device tree.
# fcc00000.usb (USB-C) stays OTG/gadget; fd000000.usb stays host-only.
CONFIG_USB_DWC3=y
CONFIG_USB_DWC3_DUAL_ROLE=y
CONFIG_USB_GADGET=y
CONFIG_USB_CONFIGFS=y
CONFIG_USB_CONFIGFS_ECM=y
CONFIG_USB_CONFIGFS_F_FS=y
CONFIG_USB_F_ECM=y
CONFIG_USB_F_FS=y

# Trim unrelated USB functions (Matching your RPi list)
CONFIG_USB_F_ACM=n
CONFIG_USB_F_SERIAL=n
CONFIG_USB_F_OBEX=n
CONFIG_USB_F_NCM=n
CONFIG_USB_F_EEM=n
CONFIG_USB_F_SUBSET=n
CONFIG_USB_F_RNDIS=n
CONFIG_USB_F_MASS_STORAGE=n
CONFIG_USB_CONFIGFS_SERIAL=n
CONFIG_USB_CONFIGFS_ACM=n
CONFIG_USB_CONFIGFS_OBEX=n
CONFIG_USB_CONFIGFS_NCM=n
CONFIG_USB_CONFIGFS_ECM_SUBSET=n
CONFIG_USB_CONFIGFS_RNDIS=n
CONFIG_USB_CONFIGFS_EEM=n
CONFIG_USB_CONFIGFS_MASS_STORAGE=n
CONFIG_USB_MASS_STORAGE=n

# Trim unused controller stacks
CONFIG_USB_DWC2=n
CONFIG_USB_CHIPIDEA=n
CONFIG_USB_EHCI_HCD=n
CONFIG_USB_OHCI_HCD=n
CONFIG_USB_NET_DRIVERS=n
CONFIG_USB_USBNET=n
CONFIG_USB_NET_CDCETHER=n
CONFIG_USB_SERIAL=n

# Networking trim (ECM dev mode focus)
CONFIG_IP_PNP=n
CONFIG_IPV6=n
CONFIG_NETFILTER=n
CONFIG_BRIDGE=n
CONFIG_VLAN_8021Q=n
CONFIG_MACVLAN=n
CONFIG_MACVTAP=n
CONFIG_TUN=n
CONFIG_VETH=n

# Subsystem Pruning
CONFIG_AUDIT=n
CONFIG_IKCONFIG=n
CONFIG_IKCONFIG_PROC=n
CONFIG_NUMA=n
CONFIG_NUMA_BALANCING=n
CONFIG_PROFILING=n
CONFIG_KEXEC=n
CONFIG_XEN=n
CONFIG_ACPI=n
CONFIG_KVM=n
CONFIG_CAN=n
CONFIG_BT=n
CONFIG_CFG80211=n
CONFIG_MAC80211=n
CONFIG_RFKILL=n
CONFIG_NFC=n
CONFIG_EFI_CAPSULE_LOADER=n
CONFIG_MTD=n
CONFIG_FPGA=n
CONFIG_OPTEE=n
CONFIG_REMOTEPROC=n
CONFIG_RPMSG=n
CONFIG_RPMSG_VIRTIO=n

# Headless trim
CONFIG_DRM=n
CONFIG_MEDIA_SUPPORT=n
CONFIG_FB=n
CONFIG_FRAMEBUFFER_CONSOLE=n
CONFIG_SOUND=n
CONFIG_SND=n

# Storage & Filesystem trim
CONFIG_BTRFS_FS=n
CONFIG_FUSE_FS=n
CONFIG_UBIFS_FS=n
CONFIG_NFS_FS=n
CONFIG_9P_FS=n
CONFIG_ATA=n

# Virtualization trim
CONFIG_ATA=n
CONFIG_PCI_IOV=n
CONFIG_PCI_HOST_GENERIC=n
CONFIG_VIRTIO=n
CONFIG_VIRTIO_BLK=n
CONFIG_VIRTIO_NET=n
CONFIG_VIRTIO_CONSOLE=n
CONFIG_VIRTIO_BALLOON=n
CONFIG_VIRTIO_PCI=n
CONFIG_VIRTIO_MMIO=n
CONFIG_HW_RANDOM_VIRTIO=n

# Debug and trace trim
CONFIG_KALLSYMS=n
CONFIG_KALLSYMS_ALL=n
CONFIG_DEBUG_KERNEL=n
CONFIG_DEBUG_FS=n
CONFIG_CORESIGHT=n
CONFIG_MEMTEST=n

# RPi-specific drivers: not needed on Rockchip
CONFIG_RASPBERRYPI_FIRMWARE=n
CONFIG_RASPBERRYPI_POWER=n
CONFIG_CLK_RASPBERRYPI=n
CONFIG_ARM_RASPBERRYPI_CPUFREQ=n
CONFIG_BCM2835_THERMAL=n
CONFIG_BCM2711_THERMAL=n
CONFIG_BCM2835_WDT=n
CONFIG_DMA_BCM2835=n
CONFIG_SERIAL_8250_BCM2835AUX=n
CONFIG_I2C_BCM2835=n
CONFIG_MMC_BCM2835=n
CONFIG_PWM_BCM2835=n
CONFIG_BCM2835_MBOX=n
CONFIG_SND_BCM2835=n