# ══════════════════════════════════════════════════════════════════════════════
# Rockchip platform — SoC and family-wide drivers
# Enables ARCH_ROCKCHIP and the RK35xx peripherals needed to boot.
# ══════════════════════════════════════════════════════════════════════════════

# ── SoC / architecture ─────────────────────────────────────────────────────
CONFIG_ARCH_ROCKCHIP=y
CONFIG_ROCKCHIP_PM_DOMAINS=y

# ── Clock / power / regulators ─────────────────────────────────────────────
CONFIG_COMMON_CLK_ROCKCHIP=y
CONFIG_POWER_SUPPLY=y
CONFIG_I2C_RK3X=y
CONFIG_MFD_RK8XX=y
CONFIG_MFD_RK8XX_I2C=y
CONFIG_REGULATOR_RK808=y
CONFIG_REGULATOR_RK8XX=y
CONFIG_REGULATOR_FAN53555=y

# ── CPU frequency ──────────────────────────────────────────────────────────
CONFIG_ARM_ROCKCHIP_CPUFREQ=y

# ── Thermal ────────────────────────────────────────────────────────────────
CONFIG_ROCKCHIP_THERMAL=y

# ── GPIO / pinctrl ─────────────────────────────────────────────────────────
CONFIG_PINCTRL_ROCKCHIP=y
CONFIG_GPIO_ROCKCHIP=y

# ── IOMMU ──────────────────────────────────────────────────────────────────
CONFIG_IOMMU_DMA=y
CONFIG_ROCKCHIP_IOMMU=y
CONFIG_ROCKCHIP_IODOMAIN=y

# ── USB ────────────────────────────────────────────────────────────────────
# DWC3 dual-role (respects per-port dr_mode from device tree).
# XHCI is required — DWC3 DUAL_ROLE creates an xhci-hcd platform device
# for the host path. Without it, VBUS-triggered role transitions fail and
# leave the controller in a half-initialized state.
# EXTCON needed for PHY_ROCKCHIP_INNO_USB2 (depends on EXTCON in 6.18).
CONFIG_EXTCON=y
CONFIG_EXTCON_USB_GPIO=y
CONFIG_USB_DWC3=y
CONFIG_USB_DWC3_DUAL_ROLE=y
CONFIG_USB_DWC3_HOST=n
CONFIG_USB_DWC3_GADGET=n
CONFIG_USB_XHCI_HCD=y
CONFIG_USB_XHCI_PLATFORM=y
CONFIG_USB_ROLE_SWITCH=y
CONFIG_ROCKCHIP_PHY=y
CONFIG_PHY_ROCKCHIP_USB=y

# ── USB PHYs ───────────────────────────────────────────────────────────────
# POWER_SUPPLY is required by Inno USB2 PHY for VBUS detection.
CONFIG_TYPEC=y
CONFIG_TYPEC_TCPM=y
CONFIG_TYPEC_TCPCI=y
CONFIG_TYPEC_FUSB302=y
CONFIG_TYPEC_GPIO_SBU=y
CONFIG_PHY_ROCKCHIP_TYPEC=y
CONFIG_PHY_ROCKCHIP_INNO_USB2=y
CONFIG_PHY_ROCKCHIP_NANENG_COMBO_PHY=y

# ── MMC / storage ─────────────────────────────────────────────────────────
# RK3568/RK3566 eMMC uses the DWCMSHC SDHCI variant.
# SD card uses Synopsys DesignWare Mobile Storage (DW-MMC).
CONFIG_MMC_DW=y
CONFIG_MMC_DW_PLTFM=y
CONFIG_MMC_DW_ROCKCHIP=y
CONFIG_MMC_HSQ=y

# ── Serial ─────────────────────────────────────────────────────────────────
CONFIG_SERIAL_8250_DW=y

# ── PWM ────────────────────────────────────────────────────────────────────
CONFIG_PWM_ROCKCHIP=y

# ── Mailbox ────────────────────────────────────────────────────────────────
CONFIG_ROCKCHIP_MBOX=y

# ── NVMEM ──────────────────────────────────────────────────────────────────
# OTP stores cpu-leakage / speed-bin data used by cpufreq-dt.
CONFIG_NVMEM=y
CONFIG_NVMEM_ROCKCHIP_OTP=y

# ── DRAM / bus frequency scaling ──────────────────────────────────────────
CONFIG_PM_DEVFREQ=y
CONFIG_PM_DEVFREQ_EVENT=y
CONFIG_DEVFREQ_EVENT_ROCKCHIP_DFI=y
CONFIG_DEVFREQ_THERMAL=y

# ── SCMI (ARM System Control and Management Interface) ─────────────────────
CONFIG_ARM_SCMI_PROTOCOL=y
CONFIG_ARM_SCMI_CPUFREQ=y
CONFIG_COMMON_CLK_SCMI=y
CONFIG_REGULATOR_ARM_SCMI=y
CONFIG_ARM_SCMI_TRANSPORT_SMC=y
CONFIG_ARM_SCMI_TRANSPORT_MAILBOX=y

# ── Crypto / HW RNG ───────────────────────────────────────────────────────
CONFIG_CRYPTO_DEV_ROCKCHIP=y
CONFIG_HW_RANDOM_ROCKCHIP=y
