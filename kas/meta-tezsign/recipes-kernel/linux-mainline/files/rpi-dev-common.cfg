# ══════════════════════════════════════════════════════════════════════════════
# Raspberry Pi dev additions — local HDMI console
# ══════════════════════════════════════════════════════════════════════════════

# ── Display / graphics ─────────────────────────────────────────────────────
CONFIG_DRM=y
CONFIG_DRM_VC4=y

# ── Input / HID ───────────────────────────────────────────────────────────
CONFIG_INPUT=y
CONFIG_SERIO=y
CONFIG_HID=y
CONFIG_USB_HID=y

# ── Virtual terminal ──────────────────────────────────────────────────────
CONFIG_VT=y

# ── Framebuffer console ───────────────────────────────────────────────────
CONFIG_FB=y
CONFIG_FRAMEBUFFER_CONSOLE=y
CONFIG_FRAMEBUFFER_CONSOLE_DETECT_PRIMARY=y

# ── Audio ──────────────────────────────────────────────────────────────────
CONFIG_SOUND=y
CONFIG_SND=y
CONFIG_SND_SOC=y
