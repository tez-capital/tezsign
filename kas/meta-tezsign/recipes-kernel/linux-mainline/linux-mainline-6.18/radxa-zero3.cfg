# Radxa Zero 3 production kernel config.
# Ensure essential RK3566 platform drivers are built-in (not modules)
# so the kernel can boot without an initramfs.

# --- Boot-critical: MMC/SD (must be =y to mount rootfs) ---
CONFIG_MMC=y
CONFIG_MMC_DW=y
CONFIG_MMC_DW_PLTFM=y
CONFIG_MMC_DW_ROCKCHIP=y
CONFIG_MMC_SDHCI=y
CONFIG_MMC_SDHCI_PLTFM=y
CONFIG_MMC_SDHCI_OF_DWCMSHC=y

# --- Boot-critical: EXT4 rootfs ---
CONFIG_EXT4_FS=y

# --- Boot-critical: RK3566 clocks, pinctrl, power ---
CONFIG_COMMON_CLK_ROCKCHIP=y
CONFIG_PINCTRL_ROCKCHIP=y
CONFIG_GPIO_ROCKCHIP=y
CONFIG_ROCKCHIP_IODOMAIN=y
CONFIG_REGULATOR=y
CONFIG_REGULATOR_FIXED_VOLTAGE=y
CONFIG_REGULATOR_GPIO=y
CONFIG_REGULATOR_RK808=y
CONFIG_MFD_RK8XX_I2C=y
CONFIG_MFD_RK8XX_SPI=y

# --- Boot-critical: serial console for debug ---
CONFIG_SERIAL_8250=y
CONFIG_SERIAL_8250_DW=y
CONFIG_SERIAL_8250_CONSOLE=y
CONFIG_SERIAL_OF_PLATFORM=y

# --- Boot-critical: I2C (needed for PMIC) ---
CONFIG_I2C=y
CONFIG_I2C_RK3X=y

# --- Boot-critical: reset and thermal ---
CONFIG_RESET_CONTROLLER=y
CONFIG_ROCKCHIP_THERMAL=y

# --- USB gadget (appliance needs ECM + FunctionFS) ---
CONFIG_USB_DWC3=y
CONFIG_USB_DWC3_GENERIC=y
CONFIG_PHY_ROCKCHIP_INNO_USB2=y
CONFIG_PHY_ROCKCHIP_NANENG_COMBO_PHY=y
CONFIG_USB_GADGET=y
CONFIG_USB_CONFIGFS=y
CONFIG_USB_CONFIGFS_ECM=y
CONFIG_USB_CONFIGFS_F_FS=y
CONFIG_USB_F_ECM=y
CONFIG_USB_F_FS=y

# --- Status LED ---
CONFIG_LEDS_CLASS=y
CONFIG_LEDS_GPIO=y
CONFIG_LEDS_TRIGGER_HEARTBEAT=y
