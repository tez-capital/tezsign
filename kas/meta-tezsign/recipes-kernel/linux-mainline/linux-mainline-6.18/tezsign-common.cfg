# Shared Tezsign kernel tuning aligned to the old fast Armbian Pi baseline.
CONFIG_EXPERT=y
CONFIG_PREEMPT_RT=n
CONFIG_HIGH_RES_TIMERS=y
CONFIG_HZ_250=y
CONFIG_HZ_1000=n
CONFIG_NO_HZ_IDLE=y
CONFIG_NO_HZ_FULL=n
CONFIG_RCU_NOCB_CPU=n
CONFIG_SUSPEND=n
CONFIG_HIBERNATION=n
CONFIG_KSM=n
CONFIG_TRANSPARENT_HUGEPAGE=y
CONFIG_TRANSPARENT_HUGEPAGE_ALWAYS=n
CONFIG_TRANSPARENT_HUGEPAGE_MADVISE=y
CONFIG_TRANSPARENT_HUGEPAGE_NEVER=n
CONFIG_CPU_FREQ_GOV_ONDEMAND=y
CONFIG_CPU_FREQ_DEFAULT_GOV_ONDEMAND=y
CONFIG_CPU_FREQ_DEFAULT_GOV_SCHEDUTIL=n
CONFIG_ENERGY_MODEL=y
CONFIG_CPU_IDLE=y
CONFIG_CMA_SIZE_MBYTES=5
