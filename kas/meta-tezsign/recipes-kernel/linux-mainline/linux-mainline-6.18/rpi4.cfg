# Raspberry Pi 4 specific production kernel skeleton.
CONFIG_BCM2711_THERMAL=y
CONFIG_BCM2835_THERMAL=n
CONFIG_USB_DWC2_PERIPHERAL=n
CONFIG_USB_DWC2_DUAL_ROLE=y
CONFIG_PCIE_BRCMSTB=n
CONFIG_PCIEPORTBUS=n
CONFIG_USB_XHCI_HCD=n
CONFIG_USB_STORAGE=n
CONFIG_USB_UAS=n
CONFIG_SCSI=n
CONFIG_BLK_DEV_SD=n

# Headless production Pi 4: no local input stack or VT console.
CONFIG_INPUT=n
CONFIG_SERIO=n
CONFIG_VT=n
CONFIG_MAGIC_SYSRQ=n
CONFIG_HID=n
CONFIG_USB_HID=n

# Appliance image does not use watchdog, LEDs, or RTC hardware.
CONFIG_WATCHDOG=n
CONFIG_LEDS_CLASS=n
CONFIG_RTC_CLASS=n
CONFIG_SENSORS_RASPBERRYPI_HWMON=n

# Keep only the Pi RNG and drop unrelated platform drivers.
CONFIG_HW_RANDOM_BCM74110=n
CONFIG_HW_RANDOM_IPROC_RNG200=n
CONFIG_HW_RANDOM_ARM_SMCCC_TRNG=n
CONFIG_HW_RANDOM_CN10K=n
CONFIG_HW_RANDOM_TPM=n

# Keep only the Pi-relevant MMC host stack.
CONFIG_MMC_ARMMMCI=n
CONFIG_MMC_STM32_SDMMC=n
CONFIG_MMC_SDHCI_ACPI=n
CONFIG_MMC_SDHCI_OF_DWCMSHC=n
CONFIG_MMC_SDHCI_CADENCE=n
CONFIG_MMC_SDHCI_F_SDH30=n
CONFIG_MMC_SPI=n
CONFIG_MMC_DW=n
CONFIG_MMC_DW_PLTFM=n
CONFIG_MMC_DW_EXYNOS=n
CONFIG_MMC_DW_HI3798CV200=n
CONFIG_MMC_DW_K3=n
CONFIG_MMC_MTK=n
CONFIG_MMC_SDHCI_XENON=n

# Drop multi-platform subsystems unrelated to a Pi appliance.
CONFIG_EDAC=n
CONFIG_VFIO=n
CONFIG_STAGING=n
CONFIG_IIO=n
CONFIG_HWSPINLOCK=n
CONFIG_ARM_MHU=n
CONFIG_PLATFORM_MHU=n

# Drop ChromeOS EC support and unrelated common clock drivers.
CONFIG_CHROME_PLATFORMS=n
CONFIG_CROS_EC=n
CONFIG_CROS_EC_I2C=n
CONFIG_CROS_EC_SPI=n
CONFIG_CROS_EC_PROTO=n
CONFIG_CROS_EC_LIGHTBAR=n
CONFIG_CROS_EC_VBC=n
CONFIG_CROS_EC_SENSORHUB=n
CONFIG_CROS_EC_SYSFS=n
CONFIG_CROS_USBPD_NOTIFY=n
CONFIG_EXTCON_USBC_CROS_EC=n
CONFIG_COMMON_CLK_RK808=n
CONFIG_COMMON_CLK_SCMI=n
CONFIG_COMMON_CLK_SCPI=n
CONFIG_COMMON_CLK_CS2000_CP=n
CONFIG_COMMON_CLK_S2MPS11=n
CONFIG_COMMON_CLK_XGENE=n
CONFIG_COMMON_CLK_PWM=n
CONFIG_COMMON_CLK_RS9_PCIE=n
CONFIG_COMMON_CLK_VC3=n
CONFIG_COMMON_CLK_VC5=n
