# Shared Raspberry Pi kernel skeleton.
# Family-wide keepers for the USB gadget path.
CONFIG_ARM_RASPBERRYPI_CPUFREQ=m
CONFIG_SENSORS_RASPBERRYPI_HWMON=m
CONFIG_USB_DWC2=y
CONFIG_USB_DWC2_PERIPHERAL=y
CONFIG_USB_DWC2_DUAL_ROLE=n
CONFIG_USB_GADGET=y
CONFIG_USB_CONFIGFS=y
CONFIG_USB_CONFIGFS_ECM=y
CONFIG_USB_CONFIGFS_F_FS=y
CONFIG_USB_F_ECM=y
CONFIG_USB_F_FS=y

# Keep only the gadget functions the appliance uses: FunctionFS + ECM.
CONFIG_USB_F_ACM=n
CONFIG_USB_F_SERIAL=n
CONFIG_USB_F_OBEX=n
CONFIG_USB_F_NCM=n
CONFIG_USB_F_EEM=n
CONFIG_USB_F_SUBSET=n
CONFIG_USB_F_RNDIS=n
CONFIG_USB_F_MASS_STORAGE=n
CONFIG_USB_CONFIGFS_SERIAL=n
CONFIG_USB_CONFIGFS_ACM=n
CONFIG_USB_CONFIGFS_OBEX=n
CONFIG_USB_CONFIGFS_NCM=n
CONFIG_USB_CONFIGFS_ECM_SUBSET=n
CONFIG_USB_CONFIGFS_RNDIS=n
CONFIG_USB_CONFIGFS_EEM=n
CONFIG_USB_CONFIGFS_MASS_STORAGE=n
CONFIG_USB_MASS_STORAGE=n

# Trim unrelated USB controller stacks.
CONFIG_USB_DWC3=n
CONFIG_USB_CHIPIDEA=n
CONFIG_USB_EHCI_HCD=n
CONFIG_USB_OHCI_HCD=n
CONFIG_USB_NET_DRIVERS=n
CONFIG_USB_USBNET=n
CONFIG_USB_NET_CDCETHER=n
CONFIG_USB_SERIAL=n

# Keep IPv4 for ECM dev mode, drop the rest of the generic network baggage.
CONFIG_IP_PNP=n
CONFIG_IPV6=n
CONFIG_NETFILTER=n
CONFIG_BRIDGE=n
CONFIG_VLAN_8021Q=n
CONFIG_MACVLAN=n
CONFIG_MACVTAP=n
CONFIG_TUN=n
CONFIG_VETH=n

# First-pass pruning of unused multi-platform subsystems.
CONFIG_AUDIT=n
CONFIG_IKCONFIG=n
CONFIG_IKCONFIG_PROC=n
CONFIG_NUMA=n
CONFIG_NUMA_BALANCING=n
CONFIG_PROFILING=n
CONFIG_KEXEC=n
CONFIG_XEN=n
CONFIG_ACPI=n
CONFIG_KVM=n
CONFIG_CAN=n
CONFIG_BT=n
CONFIG_CFG80211=n
CONFIG_MAC80211=n
CONFIG_RFKILL=n
CONFIG_NFC=n
CONFIG_EFI_CAPSULE_LOADER=n
CONFIG_MTD=n
CONFIG_FPGA=n
CONFIG_OPTEE=n
CONFIG_REMOTEPROC=n
CONFIG_RPMSG=n
CONFIG_RPMSG_VIRTIO=n

# Headless appliance trim.
CONFIG_DRM=n
CONFIG_MEDIA_SUPPORT=n
CONFIG_FB=n
CONFIG_FRAMEBUFFER_CONSOLE=n
CONFIG_SOUND=n
CONFIG_SND=n

# Filesystems not used by the appliance image.
CONFIG_BTRFS_FS=n
CONFIG_FUSE_FS=n
CONFIG_UBIFS_FS=n
CONFIG_NFS_FS=n
CONFIG_ROOT_NFS=n
CONFIG_9P_FS=n

# Multi-platform storage and virtualization trim.
CONFIG_ATA=n
CONFIG_PCI_IOV=n
CONFIG_PCI_HOST_GENERIC=n
CONFIG_VIRTIO=n
CONFIG_VIRTIO_BLK=n
CONFIG_VIRTIO_NET=n
CONFIG_VIRTIO_CONSOLE=n
CONFIG_VIRTIO_BALLOON=n
CONFIG_VIRTIO_PCI=n
CONFIG_VIRTIO_MMIO=n
CONFIG_HW_RANDOM_VIRTIO=n

# Debug and trace trim.
CONFIG_KALLSYMS=n
CONFIG_KALLSYMS_ALL=n
CONFIG_DEBUG_KERNEL=n
CONFIG_DEBUG_FS=n
CONFIG_CORESIGHT=n
CONFIG_MEMTEST=n
