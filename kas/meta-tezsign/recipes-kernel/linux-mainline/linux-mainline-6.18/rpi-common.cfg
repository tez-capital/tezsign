# Shared Raspberry Pi kernel skeleton.
# Family-wide keepers for the USB gadget path.
CONFIG_ARM_RASPBERRYPI_CPUFREQ=m
CONFIG_SENSORS_RASPBERRYPI_HWMON=m
CONFIG_USB_DWC2=y
CONFIG_USB_GADGET=y
CONFIG_USB_CONFIGFS=y
CONFIG_USB_CONFIGFS_F_FS=y

# First-pass pruning of unused multi-platform subsystems.
CONFIG_AUDIT=n
CONFIG_IKCONFIG=n
CONFIG_IKCONFIG_PROC=n
CONFIG_NUMA=n
CONFIG_NUMA_BALANCING=n
CONFIG_PROFILING=n
CONFIG_KEXEC=n
CONFIG_XEN=n
CONFIG_ACPI=n
CONFIG_KVM=n
CONFIG_CAN=n
CONFIG_BT=n
CONFIG_CFG80211=n
CONFIG_MAC80211=n
CONFIG_RFKILL=n
CONFIG_NFC=n
CONFIG_EFI_CAPSULE_LOADER=n
CONFIG_MTD=n
CONFIG_FPGA=n
CONFIG_OPTEE=n

# Headless appliance trim.
CONFIG_DRM=n
CONFIG_MEDIA_SUPPORT=n
CONFIG_FB=n
CONFIG_FRAMEBUFFER_CONSOLE=n
CONFIG_SOUND=n
CONFIG_SND=n

# Filesystems not used by the appliance image.
CONFIG_BTRFS_FS=n
CONFIG_FUSE_FS=n
CONFIG_UBIFS_FS=n
CONFIG_NFS_FS=n
CONFIG_ROOT_NFS=n
CONFIG_9P_FS=n

# Debug and trace trim.
CONFIG_KALLSYMS=n
CONFIG_KALLSYMS_ALL=n
CONFIG_DEBUG_KERNEL=n
CONFIG_DEBUG_FS=n
CONFIG_CORESIGHT=n
CONFIG_MEMTEST=n
