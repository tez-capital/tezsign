# By removing the aggressive disables, we fall back to the "sane default" arm64 defconfig.
# We exclusively configure the USB Gadget / DWC2 features as built-ins (=y) so they are 
# strictly available inside the RAM disk without needing loadable kernel modules.

CONFIG_USB_SUPPORT=y
CONFIG_USB_GADGET=y
CONFIG_USB_DWC2=y
CONFIG_USB_DWC2_PERIPHERAL=y
CONFIG_SYSFS=y
CONFIG_CONFIGFS_FS=y
CONFIG_USB_CONFIGFS=y
CONFIG_USB_CONFIGFS_F_FS=y
CONFIG_USB_CONFIGFS_F_ECM=y
CONFIG_USB_CONFIGFS_F_SUBSET=y
CONFIG_USB_CONFIGFS_ACM=n

# Required for RPi Zero 2W SD Card on Mainline (without it, rootfs doesn't mount)
CONFIG_MMC_SDHCI_IPROC=y

# Required for systemd process tracking
CONFIG_FHANDLE=y