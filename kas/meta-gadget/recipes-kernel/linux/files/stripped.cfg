# Disable Network Stack
CONFIG_NET=n
CONFIG_BT=n
CONFIG_WIRELESS=n
CONFIG_SWAP=n
CONFIG_BLOCK_LEGACY_AUTOLOAD=n
CONFIG_SUSPEND=n
CONFIG_HIBERNATION=n
CONFIG_PM=n
CONFIG_XEN=n
CONFIG_HYPERVISOR_GUEST=n

# Disable Hardware Bloat
CONFIG_SOUND=n
CONFIG_SND=n
CONFIG_DRM=n
CONFIG_FB=n
CONFIG_INPUT=n
CONFIG_HID=n
CONFIG_I2C=n
CONFIG_SPI=n
CONFIG_W1=n

# USB Gadget Support
CONFIG_USB_SUPPORT=y
CONFIG_USB_GADGET=y
CONFIG_USB_DWC2=y
CONFIG_USB_DWC2_PERIPHERAL=y
CONFIG_SYSFS=y
CONFIG_CONFIGFS_FS=y
CONFIG_USB_CONFIGFS=y
CONFIG_USB_CONFIGFS_F_FS=y
# Ensure no common class drivers are bloat-loading
CONFIG_USB_CONFIGFS_SERIAL=n
CONFIG_USB_CONFIGFS_ACM=n

# Retain requirements
CONFIG_MULTIUSER=y
CONFIG_STACKPROTECTOR=y
CONFIG_STACKPROTECTOR_STRONG=y
CONFIG_PRINTK=y

# --- FILESYSTEMS ---
# Disable everything except what we need
CONFIG_FS_POSIX_ACL=n
CONFIG_XFS_FS=n
CONFIG_BTRFS_FS=n
CONFIG_F2FS_FS=n
CONFIG_QUOTA=n
CONFIG_QFMT_V2=n
CONFIG_AUTOFS4_FS=n
CONFIG_MSDOS_FS=y
CONFIG_VFAT_FS=y
CONFIG_FAT_DEFAULT_CODEPAGE=437
CONFIG_FAT_DEFAULT_IOCHARSET="iso8859-1"
CONFIG_EXT4_FS=y
CONFIG_EXT4_USE_FOR_EXT2=y
CONFIG_INOTIFY_USER=n
CONFIG_PROC_PAGE_MONITOR=n
CONFIG_TASKSTATS=n
CONFIG_TASK_XACCT=n
CONFIG_TASK_IO_ACCOUNTING=n

# --- Internal Kernel Bloat ---
CONFIG_ADVISE_SYSCALLS=n
CONFIG_KALLSYMS=n
CONFIG_KALLSYMS_ALL=n

# --- Minimize Caching & Buffering Logic ---
CONFIG_BLOCK_LEGACY_AUTOLOAD=n
CONFIG_LRU_GEN=n              # Disable advanced page replacement logic
CONFIG_COMPACTION=n           # Disable memory defragmentation (saves CPU/RAM)
CONFIG_MIGRATION=n            # Disable moving physical pages
CONFIG_BOUNCE=n               # Disable bounce buffers for low-memory DMA

# --- Force Directness ---
CONFIG_DIRECT_IO=y            # Ensure the Direct I/O syscall path is available

# --- RAM-only Support ---
CONFIG_BLK_DEV_INITRD=y
CONFIG_RD_GZIP=y
CONFIG_TMPFS=y
CONFIG_TMPFS_POSIX_ACL=n

CONFIG_EXPERT=y
CONFIG_PREEMPT_RT=y
CONFIG_HIGH_RES_TIMERS=y
CONFIG_NO_HZ_FULL=y