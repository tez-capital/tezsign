header:
  version: 14
machine: raspberrypi0-2w-64
distro: poky

# WIC will build this standard target to generate the SD card layout,
# but the kernel placed on that SD card will contain the prebaked RAM disk.
target: tezsign-image

repos:
  poky:
    url: "https://git.yoctoproject.org/poky"
    branch: "scarthgap"   # Back to stable LTS
    layers:
      meta:
      meta-poky:
  meta-raspberrypi:
    url: "https://git.yoctoproject.org/git/meta-raspberrypi"
    branch: "scarthgap"   # Back to stable LTS
  meta-gadget:
    path: "meta-gadget"

local_conf_header:
  lts_bundling_config: |
    DEPLOY_DIR_IMAGE = "${TOPDIR}/../deploy"
    PREFERRED_PROVIDER_virtual/kernel = "linux-raspberrypi"

    # 2. THE NEW INITRAMFS STRATEGY (Standalone Sideloading)
    INITRAMFS_IMAGE = "core-image-minimal-initramfs"
    INITRAMFS_FSTYPES = "cpio.gz"
    
    # Force Yocto to copy the standalone RAM disk file into the SD card's boot partition
    IMAGE_BOOT_FILES:append = " ${INITRAMFS_IMAGE}-${MACHINE}.${INITRAMFS_FSTYPES};initramfs.cpio.gz"

    # 3. Loop Breakers
    MACHINE_ESSENTIAL_EXTRA_RDEPENDS = ""
    MACHINE_EXTRA_RDEPENDS = ""
    IMAGE_INSTALL:remove = "kernel-image kernel-modules kernel-devicetree"

    # 4. RPi OTG Hardware Support AND the new RAM disk loader
    RPI_EXTRA_CONFIG:append = "\ndtoverlay=dwc2,dr_mode=otg\ninitramfs initramfs.cpio.gz followkernel\n"

    # 5. Output Configuration
    IMAGE_FSTYPES = "wic wic.bmap"
    WKS_FILE = "gadget.wks"

  speed_and_cache: |
    # Tell Git to only download the latest snapshot, not the 20-year history
    BB_GIT_SHALLOW = "1"
    
    # Use Yocto's high-speed source mirrors before trying the main servers
    SOURCE_MIRROR_URL = "http://downloads.yoctoproject.org/mirror/sources/"
    INHERIT += "own-mirrors"
    
    # Save downloads outside the build folder so they survive a clean rebuild
    DL_DIR = "${TOPDIR}/../downloads"

  initramfs_additions: |
    # Inject our custom recipe and the libcomposite USB kernel module into the RAM disk
    PACKAGE_INSTALL:append:pn-core-image-minimal-initramfs = " tezsign-gadget kernel-module-libcomposite"

  security_lockdown: |
    # 1. Disable all root and user login passwords (air-gapped lockdown)
    # This replaces the 'passwd -l' logic in your first-boot script
    EXTRA_IMAGE_FEATURES:remove = "debug-tweaks"
    
    # 2. Never install network managers, SSH, or sudo
    # This ensures systemd-networkd, wpa_supplicant, and ssh are never built into the image
    IMAGE_INSTALL:remove = "wpa-supplicant openssh dropbear sudo networkmanager"
    
    # 3. Set a static hostname directly in the build
    hostname:pn-base-files = "tezsign"

  systemd_setup: |
    # The modern Yocto way to completely replace sysvinit with pure systemd
    INIT_MANAGER = "systemd"
    
    # We still must include 'usrmerge' because modern systemd demands a merged /usr
    DISTRO_FEATURES:append = " usrmerge"
    
    # Silent boot, load systemd from RAM disk, force DWC2 driver load
    CMDLINE = "rdinit=/sbin/init modules-load=dwc2 pcie_aspm=off mmc_core.use_spi_crc=0 console=serial0,115200 console=tty1 earlyprintk systemd.log_level=debug systemd.journald.forward_to_console=1"