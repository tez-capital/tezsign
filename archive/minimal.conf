DISTRO = "minimal"
DISTRO_NAME = "Tezsign Minimal (Pure Systemd)"
DISTRO_VERSION = "1.0"

# 1. Enable systemd and usrmerge, remove sysvinit
DISTRO_FEATURES:append = " systemd usrmerge"
DISTRO_FEATURES_BACKFILL_CONSIDERED = "sysvinit"

# 2. Set systemd as the primary init manager
VIRTUAL-RUNTIME_init_manager = "systemd"
VIRTUAL-RUNTIME_initscripts = "systemd-compat-units"

# 3. Keep BusyBox for utilities
# systemd works best with shadow-base or its own tools for login
VIRTUAL-RUNTIME_base-utils = "busybox"
VIRTUAL-RUNTIME_login_manager = "shadow-base"
PREFERRED_PROVIDER_virtual/sh = "busybox"

# 4. Use systemd's built-in getty management
USE_VT = "1"