name: build-yocto
description: Build a TezSign Yocto image with KAS

inputs:
  kas-file:
    description: 'KAS file to build'
    required: true
  release-name:
    description: 'Expected TEZSIGN_RELEASE_NAME output'
    required: true
  image-flavour:
    description: 'Image flavour marker written into appfs (.image-flavour)'
    required: true

runs:
  using: "composite"
  steps:
    - name: Free runner disk space
      shell: bash
      run: |
        df -h
        sudo rm -rf \
          /opt/az \
          /opt/ghc \
          /opt/hostedtoolcache/CodeQL \
          /usr/local/.ghcup \
          /usr/local/lib/android \
          /usr/share/dotnet
        docker system prune -af || true
        df -h

    - name: Generate image metadata files
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        mkdir -p ./kas/meta-tezsign/recipes-core/images/files

        image_version="${IMAGE_VERSION:-$(git rev-parse --short=12 HEAD)}"
        image_date="${IMAGE_DATE:-$(date -u +%Y-%m-%dT%H:%M:%SZ)}"
        image_flavour="${{ inputs.image-flavour }}"

        printf '%s\n' "${image_version}" > ./kas/meta-tezsign/recipes-core/images/files/.image-version
        printf '%s\n' "${image_date}" > ./kas/meta-tezsign/recipes-core/images/files/.image-date
        printf '%s\n' "${image_flavour}" > ./kas/meta-tezsign/recipes-core/images/files/.image-flavour

        chmod 0644 \
          ./kas/meta-tezsign/recipes-core/images/files/.image-version \
          ./kas/meta-tezsign/recipes-core/images/files/.image-date \
          ./kas/meta-tezsign/recipes-core/images/files/.image-flavour

    - name: Restore Yocto cache
      uses: actions/cache@v5
      with:
        path: |
          ${{ github.workspace }}/kas/downloads
          ${{ github.workspace }}/kas/sstate-cache
        key: yocto-${{ runner.os }}-${{ inputs.release-name }}-${{ hashFiles('kas/*.yml', 'kas/meta-tezsign/**') }}
        restore-keys: |
          yocto-${{ runner.os }}-${{ inputs.release-name }}-
          yocto-${{ runner.os }}-

    - name: Build Yocto image
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        echo "Yocto runner CPUs: $(nproc)"

        cd kas

        for repo in poky meta-raspberrypi meta-openembedded meta-arm meta-rockchip meta-virtualization; do
          if [ -e "${repo}" ] && [ ! -d "${repo}/.git" ]; then
            rm -rf "${repo}"
          fi
        done

        mkdir -p build downloads release sstate-cache
        docker run --privileged --rm \
          --user "$(id -u):$(id -g)" \
          -e HOME=/tmp \
          -e USER="$(id -un)" \
          -e LOGNAME="$(id -un)" \
          -e TEZSIGN_REPO_ROOT=/work \
          -v "${{ github.workspace }}:/work" \
          --workdir /work/kas \
          ghcr.io/siemens/kas/kas:latest \
          build "${{ inputs.kas-file }}"

    - name: Compress image
      shell: bash
      working-directory: ${{ github.workspace }}/kas
      run: |
        image="release/${{ inputs.release-name }}.img"
        test -f "${image}"
        xz -T0 -9e -f "${image}"
        ls -lh "${image}.xz"

    - uses: actions/upload-artifact@v7
      with:
        name: ${{ inputs.release-name }}.img.xz
        path: ${{ github.workspace }}/kas/release/${{ inputs.release-name }}.img.xz
        retention-days: 1
        if-no-files-found: error
