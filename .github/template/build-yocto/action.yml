name: build-yocto
description: Build a TezSign Yocto image with KAS

inputs:
  kas-file:
    description: 'KAS file to build'
    required: true
  release-name:
    description: 'Expected TEZSIGN_RELEASE_NAME output'
    required: true
  upload-gadget-binary:
    description: 'Upload the standalone tezsign gadget binary artifact'
    required: false
    default: 'false'

runs:
  using: "composite"
  steps:
    - name: Free runner disk space
      shell: bash
      run: |
        df -h
        sudo rm -rf \
          /opt/az \
          /opt/ghc \
          /opt/hostedtoolcache/CodeQL \
          /usr/local/.ghcup \
          /usr/local/lib/android \
          /usr/share/dotnet
        docker system prune -af || true
        df -h

    - name: Build Yocto payload binaries
      shell: bash
      working-directory: ${{ github.workspace }}
      run: |
        docker build -f tools/Containerfile -t tezsign/builder:latest .

        mkdir -p \
          kas/meta-tezsign/recipes-core/images/files \
          kas/meta-tezsign/recipes-core/tezsign-core/files

        docker run --rm \
          --user "$(id -u):$(id -g)" \
          -e HOME=/tmp \
          -e GOCACHE=/tmp/go-cache \
          -e GOMODCACHE=/tmp/go-mod-cache \
          -e GOOS=linux \
          -e GOARCH=arm64 \
          -e CGO_ENABLED=1 \
          -v "${PWD}:/work" \
          --workdir /work \
          tezsign/builder:latest \
          go build -v -trimpath -buildvcs=false \
            -ldflags='-s -w -buildid= -extldflags "-static"' \
            -o ./kas/meta-tezsign/recipes-core/images/files/tezsign \
            ./app/gadget

        docker run --rm \
          --user "$(id -u):$(id -g)" \
          -e HOME=/tmp \
          -e GOCACHE=/tmp/go-cache \
          -e GOMODCACHE=/tmp/go-mod-cache \
          -e GOOS=linux \
          -e GOARCH=arm64 \
          -e CGO_ENABLED=0 \
          -v "${PWD}:/work" \
          --workdir /work \
          tezsign/builder:latest \
          go build -trimpath -buildvcs=false \
            -ldflags='-s -w -buildid=' \
            -o ./kas/meta-tezsign/recipes-core/tezsign-core/files/ffs_registrar \
            ./app/ffs_registrar

    - name: Build Yocto image
      shell: bash
      working-directory: ${{ github.workspace }}/kas
      run: |
        for repo in poky meta-raspberrypi meta-openembedded meta-arm meta-rockchip meta-virtualization; do
          if [ -e "${repo}" ] && [ ! -d "${repo}/.git" ]; then
            rm -rf "${repo}"
          fi
        done

        mkdir -p build downloads release
        docker run --privileged --rm \
          --user "$(id -u):$(id -g)" \
          -e HOME=/tmp \
          -e USER="$(id -un)" \
          -e LOGNAME="$(id -un)" \
          -v "${PWD}:/work" \
          --workdir /work \
          ghcr.io/siemens/kas/kas:latest \
          build "${{ inputs.kas-file }}"

    - name: Compress image
      shell: bash
      working-directory: ${{ github.workspace }}/kas
      run: |
        image="release/${{ inputs.release-name }}.img"
        test -f "${image}"
        xz -T0 -9e -f "${image}"
        ls -lh "${image}.xz"

    - uses: actions/upload-artifact@v5
      with:
        name: ${{ inputs.release-name }}.img.xz
        path: ${{ github.workspace }}/kas/release/${{ inputs.release-name }}.img.xz
        retention-days: 1
        if-no-files-found: error

    - uses: actions/upload-artifact@v5
      if: ${{ inputs.upload-gadget-binary == 'true' }}
      with:
        name: tezsign_gadget_binary
        path: ${{ github.workspace }}/kas/meta-tezsign/recipes-core/images/files/tezsign
        retention-days: 1
        if-no-files-found: error
